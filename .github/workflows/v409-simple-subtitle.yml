name: JingHua V4.0.9 Simple Subtitle App

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Install video and analysis tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fontconfig fonts-dejavu-core
          python3 -m pip install --user numpy pillow

      - name: Rebuild V4.0.9 from complete source
        run: bash ci/v409-prepare.sh

      - name: Test simple UI, picker, autoplay and full-frame export on Android 15
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none
          script: timeout 32m bash ci/v409-ui-e2e.sh

      - name: Analyze APK and exported video
        if: always()
        continue-on-error: true
        run: |
          set +e
          python3 ci/v409-analyze.py | tee v409-results/analyzer-console.txt
          echo ${PIPESTATUS[0]} > v409-results/analyzer-exit.txt
          exit 0

      - name: Upload V4.0.9 APK and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JingHua-V4.0.9-simple-subtitle-app
          path: |
            v409-results/
            v409-prepare.log
            v409-gradle.log
            v408-prepare.log
            v408-gradle.log
          if-no-files-found: error
          retention-days: 14

      - name: Require all four reported issues fixed
        run: |
          test -f v409-results/V409_TEST_REPORT.json
          python3 - <<'PY'
          import json
          report=json.load(open('v409-results/V409_TEST_REPORT.json',encoding='utf-8'))
          assert report['full_pass'] is True, report
          print('JINGHUA_V409_ALL_USER_REPORTED_ISSUES_FIXED')
          PY
