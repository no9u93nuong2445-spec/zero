name: Build JingHua V4.0.4

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-v404:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Prepare V4.0.4 source
        shell: bash
        run: bash ci/prepare-v404-release.sh
      - name: Build V4.0.4 APK
        shell: bash
        run: |
          gradle --no-daemon --stacktrace -p jhmin clean assembleDebug | tee v404-gradle.log
          test -s jhmin/app/build/outputs/apk/debug/app-debug.apk
          unzip -t jhmin/app/build/outputs/apk/debug/app-debug.apk
          sha256sum jhmin/app/build/outputs/apk/debug/app-debug.apk | tee v404-apk-sha256.txt
      - name: Package V4.0.4 source
        shell: bash
        run: |
          tar -cJf JingHua-V4.0.4-source.tar.xz jhmin
          sha256sum JingHua-V4.0.4-source.tar.xz | tee v404-source-sha256.txt
      - name: Android 14 launch smoke test
        id: smoke
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none
          script: |
            set +e
            APK="jhmin/app/build/outputs/apk/debug/app-debug.apk"
            adb install -r "$APK" > v404-smoke-install.txt 2>&1
            install_code=$?
            adb logcat -c
            adb shell am force-stop com.bianzhifeng.jinghua
            adb shell am start -W -n com.bianzhifeng.jinghua/.HomeActivity > v404-smoke-home.txt 2>&1
            home_code=$?
            sleep 6
            adb exec-out screencap -p > v404-smoke-home.png
            adb shell am start -W -n com.bianzhifeng.jinghua/.MainActivity > v404-smoke-editor.txt 2>&1
            editor_code=$?
            sleep 6
            adb exec-out screencap -p > v404-smoke-editor.png
            adb logcat -d -v threadtime > v404-smoke-logcat.txt
            pid="$(adb shell pidof com.bianzhifeng.jinghua | tr -d '\r')"
            fatal=0
            grep -E "FATAL EXCEPTION|AndroidRuntime.*Process: com.bianzhifeng.jinghua" v404-smoke-logcat.txt && fatal=1
            if [ "$install_code" = 0 ] && [ "$home_code" = 0 ] && [ "$editor_code" = 0 ] && [ -n "$pid" ] && [ "$fatal" = 0 ]; then
              echo PASS > v404-smoke-result.txt
            else
              echo "FAIL install=$install_code home=$home_code editor=$editor_code pid=$pid fatal=$fatal" > v404-smoke-result.txt
            fi
            cat v404-smoke-result.txt
            exit 0
      - name: Upload V4.0.4 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JingHua-V4.0.4-build-evidence
          path: |
            v404-*.txt
            v404-*.png
            v404-gradle.log
          if-no-files-found: warn
          retention-days: 14
      - name: Require successful launch
        shell: bash
        run: grep -qx PASS v404-smoke-result.txt
      - name: Upload tested V4.0.4 APK
        uses: actions/upload-artifact@v4
        with:
          name: JingHua-V4.0.4-tested-apk
          path: jhmin/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
      - name: Upload V4.0.4 source
        uses: actions/upload-artifact@v4
        with:
          name: JingHua-V4.0.4-source
          path: JingHua-V4.0.4-source.tar.xz
          if-no-files-found: error
          retention-days: 14
