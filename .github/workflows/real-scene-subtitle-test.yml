name: Real Scene Subtitle Removal Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  real-scene:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Install video and analysis dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fontconfig fonts-dejavu-core curl
          python3 -m pip install --user numpy pillow
      - name: Build V4.0.4 and prepare open-film scene
        run: bash ci/real-scene-prepare.sh
      - name: Export clean, subtitle and repaired real-scene videos
        id: device_export
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel_2
          emulator-boot-timeout: 600
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none
          script: bash ci/functional-emulator.sh
      - name: Compare against the matching clean film frames
        id: analyze
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 ci/functional-analyze.py functional-results | tee functional-results/analyzer-console.txt
          code=${PIPESTATUS[0]}
          echo "$code" > functional-results/analyzer-exit.txt
          exit 0
      - name: Upload real-scene evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JingHua-V4.0.4-real-scene-subtitle-test
          path: |
            functional-results/
            functional-gradle.log
            functional-prepare.log
          if-no-files-found: error
          retention-days: 14
      - name: Require genuine real-scene removal success
        shell: bash
        run: |
          test -f functional-results/functional-v404-report.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('functional-results/functional-v404-report.json').read_text())
          assert report['full_functional_pass'] is True, report
          print('REAL_SCENE_SUBTITLE_TEST_PASS')
          PY
